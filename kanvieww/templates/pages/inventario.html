{% extends 'index.html' %}

{% block content %}
<div class="content-table">
  <table class="table" border="1" width="80%">
    <tr>
      <th>ID</th>
      <th>Cantidad</th>
      <th>ID producto</th>
    </tr>
    {% for i in datos %}
    <tr>
      <td>{{ i.id }}</td>
      <td>{{ i.cantidad }}</td>
      <td>{{ i.id_producto_id }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
