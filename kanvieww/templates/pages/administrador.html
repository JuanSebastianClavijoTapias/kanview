{% extends 'index.html' %}

{% block content %}
<div class="content-table">
  <table class="table" border="1" width="80%">
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Celular</th>
      <th>Documento</th>
    </tr>
    {% for i in datos %}
    <tr>
      <td>{{ i.id }}</td>
      <td>{{ i.nombre }}</td>
      <td>{{ i.celular }}</td>
      <td>{{ i.documento }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
