{% extends 'index.html' %}

{% block content %}
<div class="content-table">
  <table class="table" border="1" width="80%">
    <tr>
      <th>ID</th>
      <th>Nombre</th>
      <th>Categoria</th>
      <th>Cantidad</th>
      <th>Precio</th>
      <th>Descripcion</th>
      <th>Codigo producto</th>
    </tr>
    {% for i in datos %}
    <tr>
      <td>{{ i.id }}</td>
      <td>{{ i.nombre }}</td>
      <td>{{ i.categoria }}</td>
      <td>{{ i.cantidad }}</td>
      <td>{{ i.precio }}</td>
      <td>{{ i.descripcion }}</td>
      <td>{{ i.codigo_producto }}</td>
    </tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
