{% extends 'index.html' %}
{% load static %}

{% block content %}
<div class="content-table">
<table class="table" border="1" width="80%">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Fecha de nacimiento</th>
        <th>Documento</th>
        <th>Celular</th>
        <th>Direccion</th>
        <th>Edad</th>


    </tr>
    {% for i in datos %}
    <tr>
        <td>{{ i.id}}</td>
        <td>{{ i.nombre}}</td>
        <td>{{ i.fecha_nacimiento }}</td>
        <td>{{ i.documento }}</td>
        <td>{{ i.celular }}</td>
        <td>{{ i.direccion }}</td>
        <td>{{ i.edad }}</td>
    </tr>

    {% endfor %}
</table>
</div>

{% endblock %}
